name: Frontend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'pcmfe/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'pcmfe/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
        
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: pcmfe/package-lock.json
        
    - name: Install dependencies
      working-directory: ./pcmfe
      run: npm ci
      
    - name: Set up environment variables
      working-directory: ./pcmfe
      run: |
        cp .env.example .env
        echo "NUXT_PUBLIC_API_BASE=http://localhost:8000" >> .env
        
    - name: Lint with ESLint
      working-directory: ./pcmfe
      run: npm run lint
      
    - name: Format check with Prettier
      working-directory: ./pcmfe
      run: npm run format:check
      
    - name: Type check with TypeScript
      working-directory: ./pcmfe
      run: npm run type-check
      
    - name: Run unit tests
      working-directory: ./pcmfe
      run: npm run test:unit
      
    - name: Run component tests
      working-directory: ./pcmfe
      run: npm run test:component
      
    - name: Build application
      working-directory: ./pcmfe
      run: npm run build
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: frontend-build-${{ matrix.node-version }}
        path: pcmfe/.output/
        retention-days: 7

  e2e-tests:
    runs-on: ubuntu-latest
    needs: test
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: pcm_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
          
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        cache-dependency-path: pcmfe/package-lock.json
        
    - name: Set up Python for backend
      uses: actions/setup-python@v4
      with:
        python-version: 3.11
        
    - name: Install backend dependencies
      working-directory: ./pcm
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Set up backend environment
      working-directory: ./pcm
      run: |
        cp .env.example .env
        echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/pcm_test" >> .env
        echo "TESTING=true" >> .env
        
    - name: Run database migrations
      working-directory: ./pcm
      run: alembic upgrade head
      
    - name: Start backend server
      working-directory: ./pcm
      run: |
        python run.py &
        sleep 10
        
    - name: Install frontend dependencies
      working-directory: ./pcmfe
      run: npm ci
      
    - name: Install Playwright browsers
      working-directory: ./pcmfe
      run: npx playwright install --with-deps
      
    - name: Run E2E tests
      working-directory: ./pcmfe
      run: npm run test:e2e
      
    - name: Upload E2E test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: e2e-test-results
        path: pcmfe/test-results/
        retention-days: 7

  accessibility:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        cache-dependency-path: pcmfe/package-lock.json
        
    - name: Install dependencies
      working-directory: ./pcmfe
      run: npm ci
      
    - name: Build application
      working-directory: ./pcmfe
      run: npm run build
      
    - name: Start application
      working-directory: ./pcmfe
      run: |
        npm run preview &
        sleep 10
        
    - name: Run accessibility tests
      working-directory: ./pcmfe
      run: npm run test:a11y
      
    - name: Upload accessibility report
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: accessibility-report
        path: pcmfe/accessibility-report/
        retention-days: 7

  build:
    runs-on: ubuntu-latest
    needs: [test, e2e-tests, accessibility]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
      
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./pcmfe
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/pcm-frontend:latest
          ${{ secrets.DOCKER_USERNAME }}/pcm-frontend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max