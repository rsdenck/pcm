name: Deploy

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ${{ github.repository }}/pcm-backend
  IMAGE_NAME_FRONTEND: ${{ github.repository }}/pcm-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      
    outputs:
      backend-image: ${{ steps.backend-meta.outputs.tags }}
      frontend-image: ${{ steps.frontend-meta.outputs.tags }}
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Extract backend metadata
      id: backend-meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
          
    - name: Extract frontend metadata
      id: frontend-meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
          
    - name: Build and push backend image
      uses: docker/build-push-action@v5
      with:
        context: ./pcm
        file: ./pcm/Dockerfile
        push: true
        tags: ${{ steps.backend-meta.outputs.tags }}
        labels: ${{ steps.backend-meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
    - name: Build and push frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./pcmfe
        file: ./pcmfe/Dockerfile
        push: true
        tags: ${{ steps.frontend-meta.outputs.tags }}
        labels: ${{ steps.frontend-meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment: staging
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'
        
    - name: Configure kubectl
      run: |
        echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > kubeconfig
        export KUBECONFIG=kubeconfig
        kubectl config current-context
        
    - name: Deploy to staging
      run: |
        export KUBECONFIG=kubeconfig
        
        # Update deployment images
        kubectl set image deployment/pcm-backend-staging \
          pcm-backend=${{ needs.build-and-push.outputs.backend-image }} \
          -n pcm-staging
          
        kubectl set image deployment/pcm-frontend-staging \
          pcm-frontend=${{ needs.build-and-push.outputs.frontend-image }} \
          -n pcm-staging
          
        # Wait for rollout to complete
        kubectl rollout status deployment/pcm-backend-staging -n pcm-staging --timeout=600s
        kubectl rollout status deployment/pcm-frontend-staging -n pcm-staging --timeout=600s
        
    - name: Run smoke tests
      run: |
        export KUBECONFIG=kubeconfig
        
        # Get service URLs
        BACKEND_URL=$(kubectl get service pcm-backend-staging -n pcm-staging -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
        FRONTEND_URL=$(kubectl get service pcm-frontend-staging -n pcm-staging -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
        
        # Wait for services to be ready
        sleep 30
        
        # Test backend health
        curl -f http://$BACKEND_URL:8000/health || exit 1
        
        # Test frontend
        curl -f http://$FRONTEND_URL:3000 || exit 1
        
    - name: Notify deployment status
      uses: 8398a7/action-slack@v3
      if: always()
      with:
        status: ${{ job.status }}
        channel: '#deployments'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        fields: repo,message,commit,author,action,eventName,ref,workflow

  deploy-production:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment: production
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'
        
    - name: Configure kubectl
      run: |
        echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > kubeconfig
        export KUBECONFIG=kubeconfig
        kubectl config current-context
        
    - name: Deploy to production
      run: |
        export KUBECONFIG=kubeconfig
        
        # Update deployment images
        kubectl set image deployment/pcm-backend \
          pcm-backend=${{ needs.build-and-push.outputs.backend-image }} \
          -n pcm-production
          
        kubectl set image deployment/pcm-frontend \
          pcm-frontend=${{ needs.build-and-push.outputs.frontend-image }} \
          -n pcm-production
          
        # Wait for rollout to complete
        kubectl rollout status deployment/pcm-backend -n pcm-production --timeout=600s
        kubectl rollout status deployment/pcm-frontend -n pcm-production --timeout=600s
        
    - name: Run production smoke tests
      run: |
        export KUBECONFIG=kubeconfig
        
        # Get service URLs
        BACKEND_URL=$(kubectl get service pcm-backend -n pcm-production -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
        FRONTEND_URL=$(kubectl get service pcm-frontend -n pcm-production -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
        
        # Wait for services to be ready
        sleep 60
        
        # Test backend health
        curl -f http://$BACKEND_URL:8000/health || exit 1
        
        # Test frontend
        curl -f http://$FRONTEND_URL:3000 || exit 1
        
        # Test critical API endpoints
        curl -f http://$BACKEND_URL:8000/api/v1/health || exit 1
        
    - name: Create GitHub release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false
        
    - name: Notify production deployment
      uses: 8398a7/action-slack@v3
      if: always()
      with:
        status: ${{ job.status }}
        channel: '#production-deployments'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        fields: repo,message,commit,author,action,eventName,ref,workflow