version: '3.9'

services:
  # Backend Laravel
  backend:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    container_name: saas_backend
    restart: unless-stopped
    tty: true
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    environment:
      - APP_NAME=SaaS_Backend
      - APP_ENV=local
      - APP_KEY=base64:C2k8twm7YUngbEhD3nEbNwTG94TdgIkFzejsEjx+5bE=
      - APP_DEBUG=true
      - APP_URL=http://api.app.local
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=master_db
      - DB_USERNAME=root
      - DB_PASSWORD=root
    networks:
      - saas_network
    ports:
      - "8001:8000"

  # Frontend SvelteKit
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: saas_frontend
    command: npm run dev -- --host 0.0.0.0 --port 8080
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - PUBLIC_API_URL=http://api.app.local
    networks:
      - saas_network
    ports:
      - "8080:8080"

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: saas_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: master_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - saas_network

  # Redis for Cache/Queues
  redis:
    image: redis:7-alpine
    container_name: saas_redis
    restart: unless-stopped
    networks:
      - saas_network

networks:
  saas_network:
    driver: bridge

volumes:
  mysql_data:
