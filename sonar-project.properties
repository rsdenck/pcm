# SonarCloud configuration for PCM project

# Project identification
sonar.projectKey=rsdenck_pcm
sonar.organization=rsdenck
sonar.projectName=Proxmox Cloud Manager (PCM)
sonar.projectVersion=1.0

# Source code configuration
sonar.sources=pcm/,pcmfe/
sonar.tests=pcm/tests/,pcmfe/tests/

# Exclusions
sonar.exclusions=**/*test*/**,**/__pycache__/**,**/node_modules/**,**/dist/**,**/.nuxt/**,**/.output/**,**/venv/**,**/.venv/**,**/migrations/**,**/.hypothesis/**

# Test exclusions
sonar.test.exclusions=**/*test*/**

# Language-specific settings
sonar.python.coverage.reportPaths=pcm/coverage.xml
sonar.javascript.lcov.reportPaths=pcmfe/coverage/lcov.info

# Python specific
sonar.python.xunit.reportPath=pcm/test-results.xml
sonar.python.pylint.reportPath=pcm/pylint-report.json

# JavaScript/TypeScript specific
sonar.typescript.tsconfigPath=pcmfe/tsconfig.json
sonar.eslint.reportPaths=pcmfe/eslint-report.json

# Code coverage
sonar.coverage.exclusions=**/*test*/**,**/migrations/**,**/__pycache__/**,**/node_modules/**

# Duplication exclusions
sonar.cpd.exclusions=**/migrations/**,**/*test*/**

# Quality gate
sonar.qualitygate.wait=true

# Additional settings
sonar.sourceEncoding=UTF-8